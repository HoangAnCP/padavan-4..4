name: build

on: 
  push:
    branches:
    - "*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        target: [MI-R3P-PB]
        toolchain: [mipsel-linux-musl]

    steps:
      - uses: actions/checkout@v4

      - uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ matrix.target }}-${{ matrix.toolchain }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.20'
          check-latest: true
          cache: false

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          check-latest: true

      - name: Prepare
        run: |
          sudo apt update
          sudo apt install -y libtool-bin gperf python3-docutils autopoint gettext ccache

      - name: Build
        run: |
          make ${{ matrix.target }} TOOLCHAIN=${{ matrix.toolchain }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-${{ matrix.toolchain }}
          path: trunk/images/*
